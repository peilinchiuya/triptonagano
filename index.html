                '犬山附近晚餐': '找一間在地人推薦的好吃餐廳吧！吃飽飽才能為明天的最後衝刺做準備，烏拉！！',
                '犬山英迪格': '這間設計飯店質感超級好！每個角落都充滿在地特色，還可以看到犬山城喔，晚上就在這裡開趴體吧！',
                '犬山城散策': '日本現存最古老的天守閣！爬上頂樓可以俯瞰木曾川的絕景，城下的城下町也很好逛，吃個烤糰子吧！',
                '名古屋市區最後採買': '最後的血拼衝刺！！把還沒買到的藥妝、零食、紀念品全部掃進行李箱，兔兔的魔法卡準備好了！',
                '機場貴賓室': '要回家了有點不捨，在貴賓室喝杯飲料休息一下吧。回顧這趟旅程真的充滿快樂的回憶呢！',
                '虎航 IT209 航班': '滿載而歸！帶著滿滿的戰利品跟回憶回溫暖的家囉～吉伊卡哇們也累壞了，在飛機上好好睡一覺吧，呀哈！'
            };
            return guides[location] || '這是一個充滿驚喜的新行程點！小八幫你記下來了，記得多拍幾張照片留念喔！烏拉！';
        };

        // ================= [全域狀態] =================
        let state = {
            activeTab: 'itinerary',
            activeDay: 'day1',
            jpyInput: 1000,
            exchangeRate: 0.215,
            isEditingRate: false,
            activeAI: null,
            copied: false,
            copyItinerarySuccess: false, 
            gachaResult: null,           
            gachaAnimating: false,
            fortuneResult: null,
            isFortuneDrawing: false,
            syncStatus: 'offline', // 'syncing', 'synced', 'offline', 'error'
            
            memories: [],
            itinerary: initialItineraryData,
            checklist: defaultChecklist,
            
            modalConfig: { isOpen: false, isEdit: false, dayId: '', index: null },
            formData: { type: 'spot', time: '10:00-12:00', location: '', notes: '', detail: '', highlights: '' },
            deleteConfirm: { isOpen: false, dayId: '', index: null, location: '' }
        };

        // ================= [Firebase 雲端同步系統] =================
        let app, auth, db, user, appId;
        const isCanvasEnv = typeof __firebase_config !== 'undefined';

        // 判斷要用哪個資料庫
        if (isCanvasEnv) {
            app = initializeApp(JSON.parse(__firebase_config));
            appId = __app_id;
            state.syncStatus = 'syncing';
        } else if (MY_OWN_FIREBASE_CONFIG) {
            app = initializeApp(MY_OWN_FIREBASE_CONFIG);
            appId = 'my-chiikawa-family-trip'; // 預設群組名稱
            state.syncStatus = 'syncing';
        } else {
            console.log("未偵測到 Firebase Config，請自行申請加入");
        }

        if (app) {
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            initAuth();

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    // 開始監聽雲端資料變化
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_data', 'shared_state');
                    onSnapshot(docRef, (snapshot) => {
                        if (snapshot.exists()) {
                            const data = snapshot.data();
                            state.itinerary = data.itinerary || initialItineraryData;
                            state.checklist = data.checklist || defaultChecklist;
                            state.memories = data.memories || [];
                            state.exchangeRate = data.exchangeRate || 0.215;
                            state.syncStatus = 'synced';
                            renderDOM();
                        } else {
                            // 第一次進入，把預設資料存上雲端
                            window.saveToCloud();
                        }
                    }, (error) => {
                        console.error("同步錯誤:", error);
                        state.syncStatus = 'error';
                        renderDOM();
                    });
                }
            });
        }

        // 取代原本存入 LocalStorage 的方法，變成存入雲端
        window.saveToCloud = async () => {
            if (!user || !db) {
                // 如果沒有連上雲端，就偷偷存回本機就好，才不會卡住
                alert('呀哈！你現在處於「離線模式」喔！\n你的資料只有你自己看得到。\n要跟家人同步的話，記得去設定 Firebase 喔！');
                return;
            }
            
            state.syncStatus = 'syncing';
            renderDOM();

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_data', 'shared_state');
            try {
                await setDoc(docRef, {
                    itinerary: state.itinerary,
                    checklist: state.checklist,
                    memories: state.memories,
                    exchangeRate: state.exchangeRate
                });
                state.syncStatus = 'synced';
                renderDOM();
            } catch (e) {
                console.error("儲存失敗:", e);
                state.syncStatus = 'error';
                renderDOM();
            }
        };

        // ================= [天氣 API 抓取邏輯] =================
        window.weatherCache = {};
        
        window.fetchWeather = async (dayId) => {
            if (window.weatherCache[dayId]) return;
            window.weatherCache[dayId] = { loading: true };
            renderDOM();
            
            try {
                const loc = locationsMap[dayId];
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=1`;
                const res = await fetch(url);
                const data = await res.json();
                
                const max = Math.round(data.daily.temperature_2m_max[0]);
                const min = Math.round(data.daily.temperature_2m_min[0]);
                const code = data.daily.weathercode[0];
                
                let icon = '<i data-lucide="sun" class="text-orange-400"></i>';
                let desc = '晴朗';
                
                if ([1, 2, 3].includes(code)) { icon = '<i data-lucide="cloud" class="text-blue-300"></i>'; desc = '多雲'; }
                else if ([45, 48].includes(code)) { icon = '<i data-lucide="cloud-fog" class="text-gray-400"></i>'; desc = '起霧'; }
                else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) { icon = '<i data-lucide="cloud-rain" class="text-blue-500"></i>'; desc = '下雨'; }
                else if ([71, 73, 75, 77, 85, 86].includes(code)) { icon = '<i data-lucide="snowflake" class="text-blue-200"></i>'; desc = '下雪'; }
                else if ([95, 96, 99].includes(code)) { icon = '<i data-lucide="cloud-lightning" class="text-purple-500"></i>'; desc = '雷雨'; }

                window.weatherCache[dayId] = { loading: false, max, min, icon, desc, locName: loc.name };
            } catch (e) {
                window.weatherCache[dayId] = { loading: false, error: true };
            }
            renderDOM();
        };

        // ================= [幫助函數] =================
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        };

        const getGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 11) return '早安呀哈！準備出發！';
            if (hour < 17) return '午安烏拉！玩得開心嗎？';
            if (hour < 21) return '晚安～來吃頓大餐吧！';
            return '夜深了，早點休息呀哈！';
        };

        const getCountdown = () => {
            const targetDate = new Date('2026-05-08T00:00:00+08:00').getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;
            const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));

            if (daysLeft > 0) {
                return `距離出發還有 <span class="text-[#FF6B9E] font-black mx-1 text-[13px]">${daysLeft}</span> 天！呀哈！`;
            } else if (daysLeft === 0) {
                return `就是今天！準備出發！烏拉！！`;
            } else {
                return `旅途愉快！盡情享受吧！🍡`;
            }
        };

        const renderDOM = () => {
            renderHeader();
            renderMainContent();
            renderNav();
            renderModals();
            lucide.createIcons();
        };

        // ================= [渲染函數] =================
        const renderHeader = () => {
            const dayIndex = days.findIndex(d => d.id === state.activeDay);
            const tripProgress = Math.round(((dayIndex + 1) / days.length) * 100);
            
            // 💡 雲端同步狀態指示器
            let syncIndicator = '';
            if (state.syncStatus === 'synced') syncIndicator = '<div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-black text-green-500 shadow-sm flex items-center gap-1"><i data-lucide="cloud-check" class="w-3 h-3"></i> 已同步</div>';
            else if (state.syncStatus === 'syncing') syncIndicator = '<div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-black text-blue-500 shadow-sm flex items-center gap-1"><i data-lucide="cloud-cog" class="w-3 h-3 animate-spin"></i> 同步中</div>';
            else if (state.syncStatus === 'error') syncIndicator = '<div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-black text-red-500 shadow-sm flex items-center gap-1"><i data-lucide="cloud-off" class="w-3 h-3"></i> 同步失敗</div>';
            else syncIndicator = '<div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-black text-gray-400 shadow-sm flex items-center gap-1" onclick="alert(\'你目前沒有連上雲端資料庫。請照著開發者的教學設定 Firebase 來開啟同步功能喔！\')"><i data-lucide="cloud-off" class="w-3 h-3"></i> 單機模式</div>';

            document.getElementById('app-header').innerHTML = `
                <div class="absolute inset-0 bg-cover bg-center opacity-80" style="background-image: url('${bannerUrl}')"></div>
                <div class="absolute inset-x-0 bottom-0 h-full bg-gradient-to-t from-[#FFF4F7] via-[#FFF4F7]/60 to-transparent"></div>
                
                <div class="absolute top-4 left-4 bg-white/80 backdrop-blur-md px-3.5 py-1.5 rounded-full text-[11px] font-black text-[#FF6B9E] shadow-[0_2px_10px_rgba(255,107,158,0.2)] flex items-center gap-1.5">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-[#FF6B9E]"></i>
                    ${getGreeting()}
                </div>

                ${syncIndicator}

                <div class="absolute bottom-5 left-0 w-full px-6">
                    <h1 class="text-[26px] font-black tracking-widest text-[#5D4A45] drop-shadow-sm mb-1 flex items-center gap-2">
                        中部 · 北陸之旅 <span class="text-xl">🍡</span>
                    </h1>
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                        <span class="text-[10px] font-bold text-[#FF6B9E] bg-white/90 shadow-sm px-3 py-1 rounded-full uppercase tracking-widest">2026.05 Journey</span>
                        <span class="text-[11px] font-bold text-[#5D4A45] bg-white/70 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm flex items-center gap-1">
                            <i data-lucide="calendar-heart" class="w-3.5 h-3.5 text-[#FF6B9E]"></i>
                            ${getCountdown()}
                        </span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="h-1.5 flex-1 bg-white/80 rounded-full overflow-hidden shadow-inner">
                            <div class="h-full bg-gradient-to-r from-[#FF9EBE] to-[#FF6B9E] rounded-full transition-all duration-500" style="width: ${tripProgress}%"></div>
                        </div>
                        <span class="text-[9px] font-black text-[#5D4A45]/70">DAY ${dayIndex + 1}/10</span>
                    </div>
                </div>
            `;
        };

        const renderNav = () => {
            const tabs = [
                { id: 'prep', icon: '<i data-lucide="shopping-bag" class="w-6 h-6"></i>', label: '行前提醒', activeClass: 'bg-gradient-to-br from-[#7DD3FC] to-[#38BDF8] text-white shadow-[0_4px_10px_rgba(56,189,248,0.3)]', inactiveClass: 'bg-white/90 text-[#38BDF8]', textActive: 'text-[#38BDF8]' },
                { id: 'itinerary', icon: '<i data-lucide="map-pin" class="w-6 h-6"></i>', label: '夢幻行程', activeClass: 'bg-gradient-to-br from-[#FF9EBE] to-[#FF82AB] text-white shadow-[0_4px_10px_rgba(255,130,171,0.3)]', inactiveClass: 'bg-white/90 text-[#FF82AB]', textActive: 'text-[#FF82AB]' },
                { id: 'album', icon: '<i data-lucide="camera" class="w-6 h-6"></i>', label: '相冊', activeClass: 'bg-gradient-to-br from-[#A78BFA] to-[#C084FC] text-white shadow-[0_4px_10px_rgba(167,139,250,0.3)]', inactiveClass: 'bg-white/90 text-[#C084FC]', textActive: 'text-[#C084FC]' },
                { id: 'tools', icon: CustomIcons.Calculator, label: '小幫手', activeClass: 'bg-gradient-to-br from-[#FDE047] to-[#EAB308] text-white shadow-[0_4px_10px_rgba(234,179,8,0.3)]', inactiveClass: 'bg-white/90 text-[#EAB308]', textActive: 'text-[#EAB308]' },
            ];

            let html = '';
            tabs.forEach(tab => {
                const isActive = state.activeTab === tab.id;
                html += `
                    <button onclick="window.switchTab('${tab.id}')" class="flex-1 flex flex-col items-center gap-1.5 transition-all duration-300 ${isActive ? 'scale-110 -translate-y-1' : 'opacity-50 hover:opacity-100'}">
                        <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-[1.2rem] flex items-center justify-center shadow-sm border border-white transition-all ${isActive ? tab.activeClass : tab.inactiveClass}">
                            ${tab.icon}
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-tighter ${isActive ? tab.textActive : 'text-[#5D4A45]'}">${tab.label}</span>
                    </button>
                `;
            });
            document.getElementById('bottom-nav').innerHTML = html;
        };

        const renderMainContent = () => {
            let html = '';
            if (state.activeTab === 'itinerary') {
                html = generateItineraryHTML();
            } else if (state.activeTab === 'tools') {
                html = generateToolsHTML();
            } else if (state.activeTab === 'prep') {
                html = generatePrepHTML();
            } else if (state.activeTab === 'album') { 
                html = generateAlbumHTML();
            }
            document.getElementById('main-content').innerHTML = `<div class="animate-fadeIn">${html}</div>`;
        };

        const generateAlbumHTML = () => {
            let memoriesHtml = '';
            
            if (state.memories.length === 0) {
                memoriesHtml = `
                    <div class="col-span-2 text-center py-12 flex flex-col items-center justify-center text-gray-400">
                        <i data-lucide="image-plus" class="w-12 h-12 mb-3 text-pink-200"></i>
                        <p class="font-bold text-sm">還沒有照片喔！<br>快點上傳你們的第一張合照吧！呀哈！</p>
                    </div>
                `;
            } else {
                state.memories.forEach((mem, index) => {
                    const rotation = index % 2 === 0 ? '-rotate-2' : 'rotate-2';
                    const translation = index % 3 === 0 ? 'translate-y-2' : '';
                    
                    memoriesHtml += `
                        <div class="polaroid-card bg-white p-2.5 pb-4 rounded-lg border border-gray-100 transform transition-transform ${rotation} ${translation} hover:scale-105 hover:z-10 relative group">
                            <div class="aspect-square bg-gray-100 rounded-md mb-3 overflow-hidden relative">
                                <img src="${mem.image}" class="w-full h-full object-cover" />
                                <button onclick="window.deleteMemory(${mem.id})" class="absolute top-1.5 right-1.5 bg-black/60 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity active:scale-95 shadow-sm">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                            <p class="text-[#5D4A45] font-black text-[13px] text-center line-clamp-2 leading-tight">${escapeHTML(mem.caption)}</p>
                            <p class="text-gray-400 text-[9px] text-center mt-1.5 font-bold uppercase tracking-wider">${mem.date}</p>
                        </div>
                    `;
                });
            }

            return `
                <div class="px-5 mt-4 space-y-6">
                    <div class="bg-white/80 backdrop-blur-md border border-white rounded-[2.5rem] p-6 shadow-md relative">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="font-black text-xl text-[#C084FC] flex items-center gap-2">
                                <i data-lucide="camera" class="w-6 h-6"></i> 回憶拍立得
                            </h2>
                            
                            <button onclick="window.triggerPhotoUpload()" class="bg-gradient-to-r from-[#D8B4FE] to-[#C084FC] text-white px-4 py-2 rounded-full font-black text-sm shadow-sm hover:shadow-md active:scale-95 transition-all flex items-center gap-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> 新增
                            </button>
                            <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="window.handlePhotoUpload(event)">
                        </div>
                        
                        <p class="text-[11px] font-bold text-gray-400 mb-6 bg-purple-50/50 p-3 rounded-xl border border-purple-100">
                            💡 貼心提醒：因為是雲端共用相簿，為了不塞爆空間，照片上傳時會自動「復古壓縮」成拍立得大小喔！
                        </p>

                        <div class="grid grid-cols-2 gap-4 pb-4">
                            ${memoriesHtml}
                        </div>
                    </div>
                </div>
            `;
        };

        const generateItineraryHTML = () => {
            const currentDayInfo = days.find(d => d.id === state.activeDay) || days[0];
            const currentItinerary = state.itinerary[state.activeDay] || [];

            let daysHtml = '';
            days.forEach(day => {
                const isActive = state.activeDay === day.id;
                daysHtml += `
                    <button onclick="window.switchDay('${day.id}')" class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-full transition-all duration-300 shadow-sm border border-white ${isActive ? 'bg-gradient-to-r from-[#FF9EBE] to-[#FF82AB] text-white shadow-[#FF82AB]/30 scale-105' : 'bg-white/90 text-[#5D4A45]/60 hover:bg-white'}">
                        <img src="${day.icon}" class="w-6 h-6 object-contain ${!isActive ? 'grayscale opacity-60' : ''}" alt="${day.id}" />
                        <div class="flex flex-col items-start">
                            <span class="text-[10px] font-bold tracking-widest uppercase ${isActive ? 'text-white/90' : 'text-[#5D4A45]/40'}">DAY ${day.id.replace('day', '')}</span>
                            <span class="text-[13px] font-black leading-none mt-0.5 ${isActive ? 'text-white' : 'text-[#5D4A45]'}">${day.date}</span>
                        </div>
                    </button>
                `;
            });

            const weather = window.weatherCache[state.activeDay];
            let weatherHtml = '';
            let weatherTitle = '當地即時天氣';
            
            if (!weather || weather.loading) {
                weatherHtml = `
                    <div class="flex items-center gap-1.5 mt-1">
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin text-[#FF6B9E]"></i>
                        <span class="font-black text-gray-400 text-sm">抓取中...</span>
                    </div>
                `;
                if (!weather) setTimeout(() => window.fetchWeather(state.activeDay), 0);
            } else if (weather.error) {
                weatherHtml = `
                    <div class="flex items-center gap-1.5 mt-1 text-gray-400">
                        <span class="font-black text-sm">無法取得天氣</span>
                    </div>
                `;
            } else {
                weatherTitle = `${weather.locName}即時`;
                weatherHtml = `
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <div class="text-[22px] drop-shadow-sm flex items-center">${weather.icon}</div>
                        <span class="font-black text-[#5D4A45] text-[15px]">${weather.min}°-${weather.max}°C</span>
                    </div>
                `;
            }

            let listHtml = '';
            if (currentItinerary.length === 0) {
                listHtml = `
                    <div class="text-center py-10 text-[#FF82AB] font-bold">
                        <p>這天還沒有行程喔！</p>
                        <p class="text-sm opacity-60 mt-1">點擊下方按鈕加入新行程吧 呀哈！</p>
                    </div>
                `;
            } else {
                currentItinerary.forEach((item, idx) => {
                    let theme = { node: 'bg-[#93C5FD] border-[#DBEAFE]', pill: 'from-[#8BA4F9] to-[#A7BbfA]', text: 'text-[#2E3192]', icon: '<i data-lucide="plane" class="w-3.5 h-3.5"></i>', label: '航班資訊' };
                    if (item.type === 'spot') theme = { node: 'bg-[#F472B6] border-[#FCE7F3]', pill: 'from-[#F472B6] to-[#F9A8D4]', text: 'text-[#831843]', icon: '<i data-lucide="map-pin" class="w-3.5 h-3.5"></i>', label: '景點行程' };
                    else if (item.type === 'hotel') theme = { node: 'bg-[#FBBF24] border-[#FEF3C7]', pill: 'from-[#FBBF24] to-[#FDE68A]', text: 'text-[#78350F]', icon: '<i data-lucide="bed" class="w-3.5 h-3.5"></i>', label: '住宿地點' };
                    else if (item.type === 'food') theme = { node: 'bg-[#FB923C] border-[#FFEDD5]', pill: 'from-[#FB923C] to-[#FDBA74]', text: 'text-[#7C2D12]', icon: CustomIcons.Utensils, label: '美食推薦' };
                    else if (item.type === 'transport') theme = { node: 'bg-[#9CA3AF] border-[#F3F4F6]', pill: 'from-[#9CA3AF] to-[#D1D5DB]', text: 'text-[#374151]', icon: '<i data-lucide="car" class="w-3.5 h-3.5"></i>', label: '交通接駁' };

                    const isAIOpen = state.activeAI === idx;
                    const watermarkImage = dayIcons[idx % 10];

            if (state.deleteConfirm.isOpen) {
                html += `
                    <div class="fixed inset-0 z-[110] flex items-center justify-center bg-[#5D4A45]/40 backdrop-blur-sm px-5">
                        <div class="bg-white w-full max-w-[300px] rounded-[2rem] p-6 shadow-2xl transform animate-pop text-center border-4 border-[#FFF0F4]">
                            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-red-100">
                                <i data-lucide="alert-triangle" class="w-8 h-8 text-red-400"></i>
                            </div>
                            <h3 class="text-xl font-black text-[#5D4A45] mb-2">確定要刪除嗎？</h3>
                            <p class="text-sm font-bold text-[#5D4A45]/60 mb-6">
                                即將刪除 <span class="text-[#FF6B9E] px-1">${escapeHTML(state.deleteConfirm.location)}</span> 的行程，刪除後無法復原喔！呀哈！
                            </p>
                            <div class="flex gap-3">
                                <button onclick="window.closeDeleteModal()" class="flex-1 py-3 rounded-xl font-black text-[#5D4A45] bg-[#F1F5F9] hover:bg-[#E2E8F0] transition-colors">取消保留</button>
                                <button onclick="window.executeDelete()" class="flex-1 py-3 rounded-xl font-black text-white bg-red-400 hover:bg-red-500 shadow-md transition-colors">確定刪除</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('modal-root').innerHTML = html;
        };

        // ================= [全域事件方法] =================
        
        window.triggerPhotoUpload = () => {
            document.getElementById('photo-upload').click();
        };

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const MAX_HEIGHT = 400;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    
                    setTimeout(() => {
                        const caption = prompt('為這張相片寫下一句回憶吧！呀哈！(也可以留空)');
                        if (caption !== null) {
                            const dateStr = new Date().toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
                            state.memories.unshift({ id: Date.now(), image: base64, caption: caption || '美好的一天', date: dateStr });
                            window.saveToCloud(); // 💡 存入雲端
                        }
                    }, 100);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        };

        window.deleteMemory = (id) => {
            if(confirm('確定要刪除這張回憶照片嗎？呀哈！')) {
                state.memories = state.memories.filter(m => m.id !== id);
                window.saveToCloud(); // 💡 存入雲端
            }
        };

        window.drawFortune = () => {
            if (state.isFortuneDrawing) return;
            state.isFortuneDrawing = true;
            renderDOM();

            const fortunes = [
                "🌟 大吉！今天扭蛋一發入魂，想要哪隻就來哪隻！呀哈！",
                "🍱 中吉！今天會吃到超級美味的隱藏版在地美食！烏拉！",
                "🛍️ 小吉！今天會買到最後一個限量的超讚伴手禮！",
                "📸 吉！今天天氣超好，不管怎麼拍照都超級好看！",
                "♨️ 大吉！泡溫泉通體舒暢，旅途疲勞全消散！",
                "💰 吉！匯率剛好很划算，結帳的時候感覺賺到了！"
            ];

            setTimeout(() => {
                state.fortuneResult = fortunes[Math.floor(Math.random() * fortunes.length)];
                state.isFortuneDrawing = false;
                renderDOM();
            }, 1200); 
        };

        window.switchTab = (tabId) => {
            state.activeTab = tabId;
            window.scrollTo({top: 0, behavior: 'smooth'});
            renderDOM();
        };

        window.switchDay = (dayId) => {
            state.activeDay = dayId;
            state.activeAI = null;
            state.copyItinerarySuccess = false;
            window.scrollTo({top: 0, behavior: 'smooth'});
            renderDOM();
        };

        window.toggleAI = (idx) => {
            state.activeAI = state.activeAI === idx ? null : idx;
            renderDOM();
        };

        window.openGoogleMapsRoute = () => {
            const currentItinerary = state.itinerary[state.activeDay] || [];
            if(currentItinerary.length === 0) return;
            const locations = currentItinerary.map(item => encodeURIComponent(item.location)).join('/');
            window.open(`https://www.google.com/maps/dir/${locations}`, '_blank');
        };

        window.openGoogleMaps = (dayId, idx) => {
            const item = state.itinerary[dayId][idx];
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.location)}`;
            window.open(url, '_blank', 'noopener,noreferrer');
        };

        window.copyTodayItinerary = () => {
            const currentDayInfo = days.find(d => d.id === state.activeDay) || days[0];
            const currentItinerary = state.itinerary[state.activeDay] || [];
            if(currentItinerary.length === 0) return;

            let text = `📅 2026.${currentDayInfo.date} (${currentDayInfo.name}之旅)\n`;
            
            const weather = window.weatherCache[state.activeDay];
            if(weather && !weather.loading && !weather.error) {
                text += `🌤️ 天氣預估：${weather.desc} ${weather.min}°-${weather.max}°C\n`;
            }
            text += `\n`;

            currentItinerary.forEach((item) => {
                let emoji = '📍';
                if(item.type === 'flight') emoji = '✈️';
                if(item.type === 'food') emoji = '🍱';
                if(item.type === 'hotel') emoji = '🏨';
                if(item.type === 'transport') emoji = '🚗';

                text += `${emoji} ${item.time} | ${item.location}\n`;
                if(item.detail) text += `   🎟️ ${item.detail}\n`;
                if(item.notes) text += `   📝 ${item.notes}\n`;
                text += `\n`;
            });

            text += `✨ 來自吉伊卡哇行程小幫手`;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                textArea.remove();
            }

            state.copyItinerarySuccess = true;
            renderDOM();
            setTimeout(() => {
                state.copyItinerarySuccess = false;
                renderDOM();
            }, 3000);
        };

        window.playGacha = () => {
            if (state.gachaAnimating) return;
            
            state.gachaAnimating = true;
            renderDOM();

            const options = ['拉麵 🍜', '燒肉 🥩', '迴轉壽司 🍣', '居酒屋 🍢', '便利商店大餐 🍙', '漢堡排 🍛', '豬排飯 🍱', '烏龍麵 🍲', '文字燒 🥘', '速食漢堡 🍔', '生魚片海鮮丼 🐟'];
            let ticks = 0;
            
            const interval = setInterval(() => {
                state.gachaResult = options[Math.floor(Math.random() * options.length)];
                renderDOM(); 
                ticks++;
                
                if(ticks > 15) {
                    clearInterval(interval);
                    state.gachaAnimating = false;
                    state.gachaResult = `🐰 兔兔說：吃【${state.gachaResult}】！烏拉！！`;
                    renderDOM();
                }
            }, 100);
        };

        window.toggleCheck = (id) => {
            state.checklist = state.checklist.map(item => 
                item.id === id ? { ...item, checked: !item.checked } : item
            );
            window.saveToCloud(); // 💡 存入雲端
        };

        window.addChecklistItem = () => {
            const input = document.getElementById('new-checklist-item');
            const text = input.value.trim();
            if (!text) return; 

            state.checklist.push({ id: Date.now(), text: text, checked: false });
            window.saveToCloud(); // 💡 存入雲端
        };

        window.deleteChecklistItem = (id) => {
            state.checklist = state.checklist.filter(item => item.id !== id);
            window.saveToCloud(); // 💡 存入雲端
        };

        window.toggleRateEdit = (isEditing) => {
            state.isEditingRate = isEditing;
            renderDOM();
        };

        window.updateRateValue = (val) => {
            state.exchangeRate = parseFloat(val) || 0.215;
            state.isEditingRate = false;
            window.saveToCloud(); // 💡 存入雲端 (讓全家人匯率一致)
        };

        window.updateJpy = (val) => {
            state.jpyInput = val;
            renderDOM();
        };

        window.handleJpyInput = (val) => {
            state.jpyInput = val;
            const resultText = document.getElementById('twd-result-text');
            if (resultText) {
                const twd = Math.round(state.jpyInput * state.exchangeRate);
                resultText.innerText = `NT$ ${twd.toLocaleString()}`;
            }
        };

        window.copyToClipboard = () => {
            const twd = Math.round(state.jpyInput * state.exchangeRate);
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(twd.toString());
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = twd.toString();
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                textArea.remove();
            }

            state.copied = true;
            renderDOM();
            setTimeout(() => { state.copied = false; renderDOM(); }, 2000);
        };

        window.openAddModal = () => {
            state.formData = { type: 'spot', time: '10:00-12:00', location: '', notes: '', detail: '', highlights: '' };
            state.modalConfig = { isOpen: true, isEdit: false, dayId: state.activeDay, index: null };
            renderModals();
            lucide.createIcons();
        };

        window.openEditModal = (dayId, idx) => {
            const item = state.itinerary[dayId][idx];
            state.formData = { ...item };
            state.modalConfig = { isOpen: true, isEdit: true, dayId: dayId, index: idx };
            renderModals();
            lucide.createIcons();
        };

        window.closeModal = () => {
            state.modalConfig.isOpen = false;
            renderModals();
        };

        window.updateFormType = (type) => {
            state.formData.type = type;
            renderModals(); 
            lucide.createIcons();
        };

        window.updateFormData = (key, value) => {
            state.formData[key] = value;
        };

        window.saveItinerary = () => {
            if (!state.formData.location.trim()) {
                alert('請輸入地點！呀哈！');
                return;
            }
            
            const dayList = [...(state.itinerary[state.modalConfig.dayId] || [])];
            
            if (state.modalConfig.isEdit) {
                dayList[state.modalConfig.index] = state.formData;
            } else {
                dayList.push(state.formData);
            }
            
            dayList.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            state.itinerary[state.modalConfig.dayId] = dayList;
            
            state.modalConfig.isOpen = false;
            window.saveToCloud(); // 💡 存入雲端
        };

        window.confirmDelete = (dayId, idx) => {
            const item = state.itinerary[dayId][idx];
            state.deleteConfirm = { isOpen: true, dayId: dayId, index: idx, location: item.location };
            renderModals();
            lucide.createIcons();
        };

        window.closeDeleteModal = () => {
            state.deleteConfirm.isOpen = false;
            renderModals();
        };

        window.executeDelete = () => {
            const dayList = [...(state.itinerary[state.deleteConfirm.dayId] || [])];
            dayList.splice(state.deleteConfirm.index, 1);
            state.itinerary[state.deleteConfirm.dayId] = dayList;
            
            state.deleteConfirm = { isOpen: false, dayId: '', index: null, location: '' };
            state.activeAI = null;
            window.saveToCloud(); // 💡 存入雲端
        };

        // ================= [初始化] =================
        document.addEventListener("DOMContentLoaded", () => {
            renderDOM();
        });

    </script>
</body>
</html>
